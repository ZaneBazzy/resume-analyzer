<!DOCTYPE html>
<html>
<head>
    <title>Resume Analyzer</title>
</head>
<body>
    <h1>Resume Analyzer + Job Match Tool</h1>

    <form action="/analyze" method="POST" enctype="multipart/form-data">
        <div>
            <label>Upload Resume (.pdf or .txt):</label>
            <input type="file" name="resume_file" required>
        </div>

        <br>
        <div>
            <label>Upload Job Description (.pdf or .txt):</label>
            <input type="file" name="job_file" required>
        </div>

        <br>

        <button type="submit">Analyze</button>
    </form>
</body>
</html>
