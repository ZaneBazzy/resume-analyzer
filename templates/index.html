<!DOCTYPE html>
<html>
<head>
    <title>Resume Analyzer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container py-5">
        <div class="text-center mb-5">
            <h1 class="fw-bold">Resume Analyzer + Job Match Tool</h1>
            <p class="text-muted">
                Upload your resume and a job description to see your match score, matched skills, and missing skills.
            </p>
        </div>

        <div class="card shadow-sm mx-auto" style="max-width: 700px;">
            <div class="card-body p-4">
                <form action="/analyze" method="POST" enctype="multipart/form-data">
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Upload Resume</label>
                        <input type="file" name="resume_file" class="form-control" required>
                        <div class="form-text">Accepted formats: .txt or .pdf</div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">Upload Job Description</label>
                        <input type="file" name="job_file" class="form-control" required>
                        <div class="form-text">Accepted formats: .txt or .pdf</div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">
                        Analyze Match
                    </button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
